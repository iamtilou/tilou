    <script>
        (function () {
            var body = document.body;
            var video = document.getElementById("bg-video");
            var isReady = false;
            var isVideoResolved = false;
            var retryBound = false;
            var lastTime = 0;
            var stalledTicks = 0;
            var heartbeatId = 0;
            var resizeTimer = 0;

            function markReady() {
                if (isReady) {
                    return;
                }
                isReady = true;
                requestAnimationFrame(function () {
                    body.classList.add("is-ready");
                });
            }

            function markVideoPlaying() {
                if (isVideoResolved) {
                    return;
                }
                isVideoResolved = true;
                body.classList.remove("video-failed");
                body.classList.add("video-playing");
                markReady();
            }

            function markVideoFailed(isPermanent) {
                if (isVideoResolved) {
                    return;
                }
                body.classList.add("video-failed");
                markReady();
                if (isPermanent) {
                    isVideoResolved = true;
                }
            }

            function scheduleResume(delay) {
                if (document.hidden) {
                    return;
                }
                window.setTimeout(function () {
                    tryPlay();
                }, typeof delay === "number" ? delay : 120);
            }

            function ensurePlayback(force) {
                if (!video || document.hidden) {
                    return;
                }

                if (video.paused || video.ended) {
                    scheduleResume(force ? 0 : 100);
                    return;
                }

                if (force) {
                    lastTime = video.currentTime;
                    stalledTicks = 0;
                    return;
                }

                var nowTime = video.currentTime;
                if (Math.abs(nowTime - lastTime) < 0.01) {
                    stalledTicks += 1;
                    if (stalledTicks >= 2) {
                        stalledTicks = 0;
                        scheduleResume(80);
                    }
                } else {
                    stalledTicks = 0;
                }
                lastTime = nowTime;
            }

            function startHeartbeat() {
                if (heartbeatId) {
                    return;
                }
                heartbeatId = window.setInterval(function () {
                    ensurePlayback(false);
                }, 900);
            }

            function playVideo(video) {
                var playPromise = video.play();
                if (playPromise && typeof playPromise.then === "function") {
                    return playPromise;
                }
                return Promise.resolve();
            }

            function bindRetry() {
                if (retryBound || isVideoResolved) {
                    return;
                }
                retryBound = true;

                function resumeVideo() {
                    retryBound = false;
                    body.classList.remove("video-failed");
                    tryPlay();
                }

                window.addEventListener("pointerdown", resumeVideo, { once: true, passive: true });
                window.addEventListener("keydown", resumeVideo, { once: true });
            }

            function tryPlay() {
                if (!video) {
                    markVideoFailed(true);
                    return;
                }
                playVideo(video).then(function () {
                    markVideoPlaying();
                }).catch(function () {
                    markVideoFailed(false);
                    bindRetry();
                });
            }

            if (video) {
                video.muted = true;
                video.defaultMuted = true;
                video.loop = true;
                video.setAttribute("playsinline", "");
                video.setAttribute("webkit-playsinline", "");
                video.addEventListener("loadeddata", markReady, { once: true });
                video.addEventListener("canplay", tryPlay, { once: true });
                video.addEventListener("playing", markVideoPlaying, { once: true });
                video.addEventListener("timeupdate", function () {
                    lastTime = video.currentTime;
                });
                video.addEventListener("stalled", function () {
                    scheduleResume(120);
                });
                video.addEventListener("waiting", function () {
                    scheduleResume(120);
                });
                video.addEventListener("suspend", function () {
                    scheduleResume(180);
                });
                video.addEventListener("error", function () {
                    markVideoFailed(false);
                    bindRetry();
                    scheduleResume(220);
                });

                document.addEventListener("visibilitychange", function () {
                    if (document.visibilityState === "visible") {
                        ensurePlayback(true);
                        scheduleResume(80);
                    }
                });

                window.addEventListener("resize", function () {
                    window.clearTimeout(resizeTimer);
                    resizeTimer = window.setTimeout(function () {
                        ensurePlayback(true);
                        scheduleResume(80);
                    }, 120);
                });

                window.addEventListener("orientationchange", function () {
                    ensurePlayback(true);
                    scheduleResume(120);
                });

                window.addEventListener("pageshow", function () {
                    ensurePlayback(true);
                    scheduleResume(80);
                });

                setTimeout(tryPlay, 180);
                setTimeout(function () {
                    if (!isVideoResolved) {
                        markVideoFailed(false);
                    }
                }, 2600);
                startHeartbeat();
            } else {
                markVideoFailed(true);
            }

            setTimeout(markReady, 260);
        })();
    </script>
